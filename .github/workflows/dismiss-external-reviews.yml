name: Dismiss stale reviews (external PRs only)

# Dismiss approving reviews when a new commit is pushed by a user who is
# NOT a member of the org. PRs touched by org members never lose their
# approvals — the author of the PR is irrelevant; only who pushed matters.
#
# Membership check uses the repo-collaborator permission endpoint, NOT
# the org-membership endpoint:
#
#   - `GET /orgs/{org}/members/{username}` returns 404 to the workflow's
#     GITHUB_TOKEN (github-actions[bot]) for members whose org membership
#     visibility is private — even when the user is genuinely a member.
#     The previous version of this workflow used that endpoint and silently
#     dismissed approvals for every org member with private membership.
#
#   - `GET /repos/{owner}/{repo}/collaborators/{username}/permission`
#     returns the user's repo permission regardless of membership privacy
#     and works with the default GITHUB_TOKEN. Anyone with `write` or
#     `admin` here is internal to the org.

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  dismiss:
    runs-on: ubuntu-latest
    steps:
      - name: Dismiss approvals only when pusher is external
        uses: actions/github-script@v9
        with:
          script: |
            const actor = context.payload.sender.login;

            // Probe the user's effective permission on this repo.
            // 200 → admin/write/maintain/triage/read; treat write+
            // as internal. 404 → not a collaborator → external.
            let permission = "none";
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              permission = data.permission;
            } catch (e) {
              core.info(`Permission lookup failed for ${actor}: ${e.message}`);
            }

            const internal = permission === "admin" || permission === "write" || permission === "maintain";
            if (internal) {
              core.info(`${actor} has ${permission} access — keeping reviews.`);
              return;
            }

            core.info(`${actor} is external (permission=${permission}) — dismissing approved reviews.`);
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            for (const review of reviews) {
              if (review.state === "APPROVED") {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  review_id: review.id,
                  message: "Re-review required: a new commit was pushed by an external contributor.",
                });
                core.info(`Dismissed approval by ${review.user.login}.`);
              }
            }
