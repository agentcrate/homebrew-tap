name: Dismiss stale reviews (external PRs only)

on:
  pull_request:
    types: [synchronize]

permissions:
  pull-requests: write

jobs:
  dismiss:
    runs-on: ubuntu-latest
    if: github.event.pull_request.author_association != 'MEMBER' && github.event.pull_request.author_association != 'OWNER' && github.event.pull_request.author_association != 'COLLABORATOR'
    steps:
      - name: Dismiss stale reviews
        uses: actions/github-script@v7
        with:
          script: |
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            for (const review of reviews.data) {
              if (review.state === 'APPROVED') {
                await github.rest.pulls.dismissReview({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.payload.pull_request.number,
                  review_id: review.id,
                  message: 'New commits pushed by external contributor — re-review required.',
                });
              }
            }
